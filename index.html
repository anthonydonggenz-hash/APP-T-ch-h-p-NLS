<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TD AI Trainer Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV" crossorigin="anonymous">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                primary: '#C5A021',
                accent: '#D4AF37',
                light: '#F9F6E5',
                dark: '#8C6D00',
              },
              // Admin specific colors
              "primary": "#B4975A",
              "trainer-gold": "#B4975A",
              "trainer-gold-dark": "#8C733E",
              "trainer-gold-light": "#D9C59A",
              "background-light": "#FDFCF8",
              "surface": "#FFFFFF",
              
              premium: '#FCFBFA',
              sidebar: '#111111',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Noto Serif', 'serif'],
              display: ["Inter"]
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(212, 175, 55, 0.4); }
      
      .a4-container {
        width: 100%;
        max-width: 210mm;
        min-height: 297mm;
        background: white;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        margin: 0 auto;
        padding: 25mm;
        position: relative;
      }
      
      /* Admin Dashboard Styles */
      .glass-card {
          background: rgba(255, 255, 255, 0.9);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(180, 151, 90, 0.15);
      }
      .glow-gold {
          box-shadow: 0 10px 30px -10px rgba(180, 151, 90, 0.25);
      }
      .sidebar-active {
          background-color: rgba(180, 151, 90, 0.08);
          border-right: 3px solid #B4975A;
          color: #B4975A;
      }
      .gold-gradient {
          background: linear-gradient(135deg, #B4975A 0%, #D9C59A 100%);
      }
      .gold-button-gradient {
          background: linear-gradient(to right, #B4975A, #C5A059);
      }
      .table-header-gradient {
          background: linear-gradient(to bottom, #FDFCF8, #F5F2E9);
      }

      @media print {
        .a4-container {
          box-shadow: none;
          margin: 0;
          width: 100%;
        }
        body {
          background: white;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "katex": "https://esm.sh/katex@0.16.9",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.91.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-premium text-slate-800 antialiased overflow-hidden">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
